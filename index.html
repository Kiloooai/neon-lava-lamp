<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Lava Lamp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            cursor: crosshair;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #0a0015 0%, #1a0030 50%, #0a0015 100%);
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 18px;
            border-radius: 12px;
            color: #f0f;
            text-shadow: 0 0 8px #f0f;
            border: 1px solid rgba(255, 0, 255, 0.3);
            backdrop-filter: blur(5px);
            user-select: none;
            z-index: 100;
            max-width: 280px;
        }

        .controls h2 {
            margin-bottom: 12px;
            font-size: 17px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 5px;
            color: #ff0;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #f0f;
        }

        button {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            margin-top: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .value-display {
            float: right;
            color: #fff;
            font-weight: bold;
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            text-align: right;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        #custom-cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid #f0f;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #f0f;
        }

        .hint {
            font-size: 10px;
            color: #aaa;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌋 NEON LAVA LAMP</h2>

        <div class="control-group">
            <label>Blob Count <span class="value-display" id="countVal">15</span></label>
            <input type="range" id="blobCount" min="5" max="50" value="15">
        </div>

        <div class="control-group">
            <label>Rise Speed <span class="value-display" id="speedVal">1.0</span>x</label>
            <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Blob Size <span class="value-display" id="sizeVal">60</span>px</label>
            <input type="range" id="size" min="20" max="120" value="60">
        </div>

        <div class="control-group">
            <label>Wobble <span class="value-display" id="wobbleVal">1.0</span>x</label>
            <input type="range" id="wobble" min="0" max="3" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Color Scheme</label>
            <select id="colorScheme" style="width:100%; background:#000; color:#f0f; border:1px solid #f0f; padding:5px; border-radius:4px;">
                <option value="classic">Classic (red/yellow)</option>
                <option value="cyber">Cyber (cyan/magenta)</option>
                <option value="rainbow">Rainbow</option>
                <option value="matrix">Matrix (greens)</option>
                <option value="sunset">Sunset (orange/purple)</option>
            </select>
        </div>

        <button id="resetBtn">Reset Blobs</button>
        <button id="addBtn">Add Blob (Click)</button>
        <p class="hint">Click canvas to add blob at cursor</p>
    </div>

    <div class="stats">
        <div>Blobs: <span id="blobCountStat">0</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>

    <div class="instructions">
        Neon Lava Lamp — watch blobs rise, wobble, and glow. Click to add more.
    </div>

    <div id="custom-cursor"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const customCursor = document.getElementById('custom-cursor');

        const blobCountSlider = document.getElementById('blobCount');
        const speedSlider = document.getElementById('speed');
        const sizeSlider = document.getElementById('size');
        const wobbleSlider = document.getElementById('wobble');
        const colorSchemeSelect = document.getElementById('colorScheme');
        const resetBtn = document.getElementById('resetBtn');
        const addBtn = document.getElementById('addBtn');

        let blobs = [];
        let mouseX = 0, mouseY = 0;
        let lastTime = 0;
        let fps = 60;

        const colorSchemes = {
            classic: ['#ff0000', '#ffff00', '#ff8800', '#ff4400'],
            cyber: ['#00ffff', '#ff00ff', '#00ff88', '#ff0088'],
            rainbow: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0088ff', '#ff00ff'],
            matrix: ['#00ff00', '#00cc00', '#00aa00', '#00ff88'],
            sunset: ['#ff6b6b', '#ffa07a', '#ff7f50', '#ff4500', '#da70d6']
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Blob {
            constructor(x, y, r, color) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || canvas.height + r;
                this.r = r || (parseInt(sizeSlider.value) * (0.7 + Math.random() * 0.6));
                this.color = color || this.pickColor();
                this.speed = (0.5 + Math.random() * 1) * parseFloat(speedSlider.value);
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.originalR = this.r;
            }

            pickColor() {
                const scheme = colorSchemeSelect.value;
                const palette = colorSchemes[scheme];
                return palette[Math.floor(Math.random() * palette.length)];
            }

            update() {
                // Rise upward
                this.y -= this.speed * parseFloat(speedSlider.value);

                // Horizontal wobble
                this.wobbleOffset += this.wobbleSpeed;
                const wobble = Math.sin(this.wobbleOffset) * 20 * parseFloat(wobbleSlider.value);
                this.drawX = this.x + wobble;

                // Reset when off top
                if (this.y + this.r < 0) {
                    this.y = canvas.height + this.r;
                    this.x = Math.random() * canvas.width;
                    this.r = parseInt(sizeSlider.value) * (0.7 + Math.random() * 0.6);
                    this.color = this.pickColor();
                }

                // Mouse interaction: gentle push away
                const dx = this.drawX - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    const force = (150 - dist) / 150;
                    this.x += (dx/dist) * force * 2;
                }
            }

            draw() {
                // Glow
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color;

                // Gradient fill for 3D blob effect
                const grad = ctx.createRadialGradient(this.drawX, this.y - this.r/3, this.r * 0.2, this.drawX, this.y, this.r);
                grad.addColorStop(0, '#ffffff'); // highlight
                grad.addColorStop(0.3, this.color);
                grad.addColorStop(1, this.darkenColor(this.color, -50));

                ctx.beginPath();
                ctx.arc(this.drawX, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.shadowBlur = 0;
            }

            darkenColor(hex, percent) {
                const num = parseInt(hex.replace('#',''), 16),
                    amt = Math.round(2.55 * percent),
                    R = Math.max((num >> 16) - amt, 0),
                    G = Math.max((num >> 8 & 0x00FF) - amt, 0),
                    B = Math.max((num & 0x0000FF) - amt, 0);
                return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
            }
        }

        function initBlobs() {
            blobs = [];
            const count = parseInt(blobCountSlider.value);
            for (let i = 0; i < count; i++) {
                blobs.push(new Blob(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    null,
                    null
                ));
            }
        }

        function animate(timestamp) {
            const deltaTime = timestamp - lastTime || 16;
            lastTime = timestamp;
            fps = Math.round(1000 / deltaTime);
            document.getElementById('fps').textContent = fps;

            // Gentle fade for motion blur
            ctx.fillStyle = 'rgba(10, 0, 21, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update & draw blobs
            blobs.forEach(blob => {
                blob.update();
                blob.draw();
            });

            // Stats
            document.getElementById('blobCountStat').textContent = blobs.length;

            requestAnimationFrame(animate);
        }

        // Mouse tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            customCursor.style.left = mouseX + 'px';
            customCursor.style.top = mouseY + 'px';
        });

        // Click to add blob
        canvas.addEventListener('click', (e) => {
            const r = parseInt(sizeSlider.value) * (0.8 + Math.random() * 0.4);
            blobs.push(new Blob(e.clientX, e.clientY, r, null));
            // Update slider to match new count
            blobCountSlider.value = blobs.length;
            document.getElementById('countVal').textContent = blobs.length;
        });

        // Control listeners
        function updateDisplays() {
            document.getElementById('countVal').textContent = blobCountSlider.value;
            document.getElementById('speedVal').textContent = speedSlider.value;
            document.getElementById('sizeVal').textContent = sizeSlider.value;
            document.getElementById('wobbleVal').textContent = wobbleSlider.value;
        }

        [blobCountSlider, speedSlider, sizeSlider, wobbleSlider].forEach(slider => {
            slider.addEventListener('input', () => {
                updateDisplays();
                if (slider === blobCountSlider) {
                    // Adjust blob count
                    const target = parseInt(blobCountSlider.value);
                    while (blobs.length < target) {
                        blobs.push(new Blob(null, null, null, null));
                    }
                    while (blobs.length > target) {
                        blobs.pop();
                    }
                }
            });
        });

        colorSchemeSelect.addEventListener('change', () => {
            blobs.forEach(blob => blob.color = blob.pickColor());
        });

        resetBtn.addEventListener('click', () => {
            initBlobs();
        });

        addBtn.addEventListener('click', () => {
            const r = parseInt(sizeSlider.value) * (0.8 + Math.random() * 0.4);
            blobs.push(new Blob(
                Math.random() * canvas.width,
                canvas.height + r,
                r,
                null
            ));
            blobCountSlider.value = blobs.length;
            document.getElementById('countVal').textContent = blobs.length;
        });

        updateDisplays();
        initBlobs();
        animate(0);
    </script>
</body>
</html>
